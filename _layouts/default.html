<!DOCTYPE html>
<html lang="ar" dir="rtl"> 
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>{% if page.title %}{{ page.title }} | قمة التميز{% else %}قمة التميز للاستشارات المالية والإدارية{% endif %}</title>

  {% if page.description %}
    <meta name="description" content="{{ page.description }}">
  {% else %}
    <meta name="description" content="قمة التميز للاستشارات المالية والإدارية في الرياض. نقدم حلولاً احترافية في تطوير النظم، التخطيط المالي، والهيكلة الإدارية لدعم نمو الشركات السعودية.">
  {% endif %}

  {% if page.url == "/index.html" or page.url == "/" %}
    <link rel="canonical" href="https://www.gimahpro.com/">
  {% else %}
    <link rel="canonical" href="{{ page.url | absolute_url }}">
  {% endif %}

  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:title" content="{% if page.title %}{{ page.title }} | قمة التميز{% else %}قمة التميز للاستشارات المالية والإدارية{% endif %}">
  <meta property="og:description" content="{{ page.description | default: 'قمة التميز للاستشارات المالية والإدارية في الرياض. نقدم حلولاً احترافية في تطوير النظم والتخطيط المالي.' }}">
  <meta property="og:image" content="{{ '/assets/images/og-main.jpg' | absolute_url }}">

  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="{{ page.url | absolute_url }}">
  <meta property="twitter:title" content="{% if page.title %}{{ page.title }} | قمة التميز{% else %}قمة التميز للاستشارات المالية والإدارية{% endif %}">
  <meta property="twitter:description" content="{{ page.description | default: 'قمة التميز للاستشارات المالية والإدارية في الرياض. نقدم حلولاً احترافية في تطوير النظم والتخطيط المالي.' }}">
  <meta property="twitter:image" content="{{ '/assets/images/og-main.jpg' | absolute_url }}">

  <link rel="icon" type="image/png" href="{{ '/favicon.png' | relative_url }}">
  <link rel="shortcut icon" href="{{ '/favicon.png' | relative_url }}" type="image/png">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-RNF0DYEEFT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-RNF0DYEEFT');
  </script>

  <script type="application/ld+json">
  {% if page.layout == "post" %}
  {
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "headline": "{{ page.title }}",
    "description": "{{ page.description }}",
    "image": "{{ page.image | absolute_url }}",
    "author": {
      "@type": "Organization",
      "name": "قمة التميز"
    },
    "publisher": {
      "@type": "Organization",
      "name": "قمة التميز للاستشارات المالية والإدارية",
      "logo": {
        "@type": "ImageObject",
        "url": "{{ '/assets/images/gimahpro-logo.png' | absolute_url }}"
      }
    },
    "datePublished": "{{ page.date | date_to_xmlschema }}"
  }
  {% else %}
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "قمة التميز للاستشارات المالية والإدارية",
    "url": "https://www.gimahpro.com/",
    "logo": "{{ '/assets/images/gimahpro-logo.png' | absolute_url }}",
    "contactPoint": {
      "@type": "ContactPoint",
      "telephone": "+966533221169",
      "contactType": "customer service",
      "areaServed": "SA",
      "availableLanguage": "Arabic"
    },
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "حي الياسمين",
      "addressLocality": "الرياض",
      "postalCode": "13325",
      "addressCountry": "SA"
    },
    "sameAs": [
      "https://www.linkedin.com/company/gimahpro",
      "https://twitter.com/gimahpro",
      "https://www.instagram.com/gimahpro"
    ]
  }
  {% endif %}
  </script>
</head>
<body>

  {% include header.html %}

  <main class="page-content">
    {{ content }}
  </main>

  {% include footer.html %}

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>

</body>
</html>
