<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Page Not Found</title>

  <script>
    // إذا كان الرابط ينتهي بـ .html
    if (window.location.pathname.endsWith(".html")) {
      // إزالة .html
      var newPath = window.location.pathname.replace(".html", "/");

      // إعادة التوجيه
      window.location.href = newPath;
    }
  </script>

</head>
