---
layout: default
title: "أرشيف قمة التميز"
permalink: /archive.html
---

<div class="archive-container" style="max-width: 900px; margin: 0 auto; padding: 40px 20px; direction: rtl;">
    <h1 style="text-align: center; color: #004a99; margin-bottom: 50px; font-size: 2rem;">أرشيف الاستشارات والمعرفة</h1>

    {% for category in site.categories %}
    <div class="category-wrapper" style="margin-bottom: 60px;">
        
        <div class="category-header" style="text-align: center; margin-bottom: 25px; position: relative;">
            <h2 style="display: inline-block; background: #f9f9f9; padding: 10px 30px; color: #004a99; border: 2px solid #d4af37; border-radius: 50px; font-size: 1.4rem; margin: 0; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                 {{ category[0] }}
            </h2>
            <div style="position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: #eee; z-index: -1;"></div>
        </div>
        
        <div class="posts-list" style="background: #fff; border-radius: 12px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); overflow: hidden;">
            {% for post in category[1] %}
            <a href="{{ post.url | relative_url }}" style="display: flex; justify-content: space-between; align-items: center; padding: 18px 25px; text-decoration: none; border-bottom: 1px solid #f0f0f0; transition: background 0.3s;">
                <span style="color: #333; font-weight: 600; font-size: 1.1rem; line-height: 1.4;">{{ post.title }}</span>
                <span style="color: #999; font-size: 0.85rem; white-space: nowrap; margin-right: 15px;">{{ post.date | date: "%d/%m/%Y" }}</span>
            </a>
            {% endfor %}
        </div>
    </div>
    {% endfor %}
</div>

<style>
    /* تأثير عند تمرير الماوس على المقال */
    .posts-list a:hover {
        background-color: #fcf9f3;
    }
    .posts-list a:last-child {
        border-bottom: none;
    }
    /* تحسين العرض على الجوال */
    @media (max-width: 600px) {
        .category-header h2 { font-size: 1.1rem; padding: 8px 20px; }
        .posts-list a { padding: 15px; flex-direction: column; align-items: flex-start; }
        .posts-list a span:last-child { margin-top: 8px; margin-right: 0; }
    }
</style>
